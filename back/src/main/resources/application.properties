spring.application.name=rotatix

# 1. Configurações de Conexão com o Banco de Dados (MySQL do Laragon)
spring.datasource.url=jdbc:mysql://localhost:3306/rotatix_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Configurações do JPA/Hibernate (A mágica que cria as tabelas)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true